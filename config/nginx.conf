upstream fastapi {
    server 127.0.0.1:8000;
}

upstream mediamtx_hls {
    server 127.0.0.1:8888;
}

upstream mediamtx_whip {
    server 127.0.0.1:8889;
}

upstream mediamtx_api {
    server 127.0.0.1:9997;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name www.screenshare.fun screenshare.fun 31.97.156.167 localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.screenshare.fun screenshare.fun 31.97.156.167 localhost;

    # SSL certificates
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # API proxy
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # HLS proxy
    location /hls/ {
        proxy_pass http://mediamtx_hls/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # WHIP proxy
    location /whip/ {
        proxy_pass http://mediamtx_whip/whip/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # MediaMTX API proxy
    location /mediamtx/ {
        proxy_pass http://mediamtx_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
