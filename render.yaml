services:
  - type: web
    name: screenshare-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start.sh"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.18
    disk:
      name: screenshare-data
      mountPath: /opt/render/project/src/sessions
      sizeGB: 1