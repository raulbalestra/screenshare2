<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização da Tela</title>
    <!-- Importando uma fonte moderna do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Importando Font Awesome para ícones (sem o atributo de integridade) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f4f6f9;
            --text-color: #333333;
            --background-color: #ffffff;
            --button-bg-color: #dc3545;
            --button-hover-bg-color: #c82333;
            --transition-speed: 0.3s;
            --border-radius: 15px;
            --font-family: 'Roboto', sans-serif;
        }

        /* Reset básico */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--secondary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            height: 100vh;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        h2 {
            color: var(--primary-color);
            font-size: 1.2em;
            text-align: center;
            margin: 10px 0;
            padding: 0 10px;
            flex-shrink: 0;
            width: 100%;
        }

        /* Container para a imagem */
        .image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Estilos para a imagem da tela */
        #screen {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* Responsividade Desktop */
        @media (min-width: 769px) {
            h2 {
                font-size: 1.5em;
                margin: 20px 0;
            }
            
            #screen {
                max-width: 95%;
                max-height: 95%;
            }
        }

        /* Responsividade Mobile - Portrait */
        @media (max-width: 768px) and (orientation: portrait) {
            h2 {
                font-size: 1em;
                margin: 8px 0;
                padding: 0 5px;
            }
            
            body {
                justify-content: flex-start;
            }
            
            .image-container {
                padding: 5px;
            }
        }

        /* Responsividade Mobile - Landscape */
        @media (max-width: 768px) and (orientation: landscape) {
            h2 {
                font-size: 0.9em;
                margin: 5px 0;
                padding: 0 5px;
            }
            
            body {
                justify-content: flex-start;
            }
            
            .image-container {
                padding: 2px;
            }
        }
        
        /* Para dispositivos muito pequenos */
        @media (max-width: 480px) {
            h2 {
                font-size: 0.85em;
                margin: 5px 0;
            }
        }
        
        /* Ajuste para barras de navegação mobile */
        @supports (-webkit-touch-callout: none) {
            body {
                min-height: -webkit-fill-available;
                height: -webkit-fill-available;
            }
        }

        /* Estilos para a mensagem de espera */
        #message {
            font-size: 1.2em;
            color: #555;
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 90%;
            margin: auto;
        }
        
        @media (max-width: 768px) {
            #message {
                font-size: 1em;
                padding: 20px 15px;
                max-width: 95%;
            }
            
            #message i {
                font-size: 2em !important;
                margin-bottom: 15px !important;
            }
            
            #message .waiting-text {
                font-size: 1em !important;
                margin-bottom: 10px !important;
            }
            
            #message .instruction-text {
                font-size: 0.85em !important;
            }
        }
        
        #message i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: block;
        }
        
        #message .waiting-text {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        #message .instruction-text {
            font-size: 0.9em;
            color: #777;
            line-height: 1.6;
        }
        
        /* Indicador de transmissão pausada */
        #pausedIndicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.2em;
            z-index: 1000;
            display: none;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        
        #pausedIndicator i {
            display: block;
            font-size: 2em;
            margin-bottom: 10px;
            color: #ffc107;
        }
        
        @media (max-width: 768px) {
            #pausedIndicator {
                font-size: 1em;
                padding: 15px 25px;
            }
            
            #pausedIndicator i {
                font-size: 1.5em;
            }
            
            #pausedIndicator small {
                font-size: 0.75em !important;
            }
        }

    </style>
</head>
<body>
    <h2>Painel de Filas - {{ localidade|capitalize }}</h2>
    <div class="image-container">
        <img id="screen" src="" alt="Transmissão da Tela" style="display: none;">
        <div id="message">
            <i class="fas fa-video-slash"></i>
            <div class="waiting-text">Aguardando o início da transmissão...</div>
            <div class="instruction-text">
                A transmissão ainda não foi iniciada.<br>
                Aguarde o operador iniciar o compartilhamento de tela.
            </div>
        </div>
    </div>
    <div id="pausedIndicator">
        <i class="fas fa-pause-circle"></i>
        <div>Transmissão Pausada</div>
        <small style="font-size: 0.8em; opacity: 0.8;">Mostrando última imagem capturada</small>
    </div>

    <script>
        const baseImageUrl = "/serve_pil_image/";
        const localidade = "{{ localidade|default('') }}";  
        const screenImage = document.getElementById('screen');
        const messageDiv = document.getElementById('message');
        const pausedIndicator = document.getElementById('pausedIndicator');

        let updateInterval;
        let cleanupInterval;
        let consecutiveErrors = 0;
        let lastSuccessfulImage = null;
        let lastSuccessfulTimestamp = null;
        let isUpdating = false; // Previne requisições simultâneas
        let updateDelay = 500; // Intervalo inicial: 500ms (mais rápido)
        const MIN_UPDATE_DELAY = 300; // Mínimo: 300ms (3 FPS)
        const MAX_UPDATE_DELAY = 2000; // Máximo: 2s quando há erros
        const MAX_IDLE_TIME = 10000; // 10 segundos sem atualização = transmissão parada
        
        // Performance: Cache de URLs para evitar recriação
        const urlCache = new Map();
        const MAX_CACHE_SIZE = 5;

        function checkForTransmission() {
            if (!localidade) {
                messageDiv.textContent = "Localidade não especificada.";
                return;
            }

            const imageUrl = baseImageUrl + localidade + "/screen.png?random=" + new Date().getTime();
            const img = new Image();
            img.onload = function() {
                screenImage.src = imageUrl;
                screenImage.style.display = 'block';
                messageDiv.style.display = 'none';
                lastSuccessfulImage = imageUrl;
                lastSuccessfulTimestamp = Date.now();
                consecutiveErrors = 0;
                startUpdatingScreen();
                startCleanupTask();
            };
            img.onerror = function() {
                // Se nunca carregou nenhuma imagem, mostra mensagem
                if (!lastSuccessfulImage) {
                    screenImage.style.display = 'none';
                    messageDiv.style.display = 'block';
                    messageDiv.innerHTML = `
                        <i class="fas fa-video-slash"></i>
                        <div class="waiting-text">Nenhuma transmissão ativa</div>
                        <div class="instruction-text">
                            A transmissão ainda não foi iniciada para <strong>${localidade}</strong>.<br>
                            Aguarde o operador iniciar o compartilhamento de tela.
                        </div>
                    `;
                } else {
                    // Se já tinha imagem, mantém a última imagem válida
                    console.log("[Frontend] Mantendo última imagem válida");
                }
            };
            img.src = imageUrl;
        }

        function updateScreen() {
            if (!localidade || isUpdating) return;
            
            isUpdating = true;
            const imageUrl = baseImageUrl + localidade + "/screen.png?random=" + Date.now();
            
            // Criar nova imagem com timeout para evitar travamentos
            const testImg = new Image();
            const loadTimeout = setTimeout(() => {
                testImg.src = ''; // Cancela carregamento
                handleError();
            }, 3000); // Timeout de 3 segundos
            
            testImg.onload = function() {
                clearTimeout(loadTimeout);
                
                // Otimização: Usa cache de URLs
                if (urlCache.size > MAX_CACHE_SIZE) {
                    const firstKey = urlCache.keys().next().value;
                    urlCache.delete(firstKey);
                }
                urlCache.set(imageUrl, true);
                
                screenImage.src = imageUrl;
                lastSuccessfulImage = imageUrl;
                lastSuccessfulTimestamp = Date.now();
                consecutiveErrors = 0;
                
                // Adaptação dinâmica: Diminui delay quando está funcionando bem
                if (updateDelay > MIN_UPDATE_DELAY) {
                    updateDelay = Math.max(MIN_UPDATE_DELAY, updateDelay - 50);
                    restartUpdating();
                }
                
                // Se estava mostrando mensagem, esconde
                if (messageDiv.style.display !== 'none') {
                    messageDiv.style.display = 'none';
                    screenImage.style.display = 'block';
                }
                
                pausedIndicator.style.display = 'none';
                isUpdating = false;
            };
            
            testImg.onerror = handleError;
            
            function handleError() {
                clearTimeout(loadTimeout);
                consecutiveErrors++;
                console.warn(`[Frontend] Erro ao carregar frame (${consecutiveErrors} consecutivos)`);
                
                // Adaptação dinâmica: Aumenta delay quando há erros
                if (consecutiveErrors > 2) {
                    updateDelay = Math.min(MAX_UPDATE_DELAY, updateDelay + 200);
                    restartUpdating();
                }
                
                const timeSinceLastUpdate = Date.now() - (lastSuccessfulTimestamp || 0);
                
                if (timeSinceLastUpdate > MAX_IDLE_TIME) {
                    console.log("[Frontend] Transmissão parada detectada - limpando tela");
                    screenImage.style.display = 'none';
                    messageDiv.style.display = 'block';
                    messageDiv.innerHTML = `
                        <i class="fas fa-stop-circle"></i>
                        <div class="waiting-text">Transmissão encerrada</div>
                        <div class="instruction-text">
                            A transmissão de <strong>${localidade}</strong> foi finalizada.<br>
                            Aguarde o operador iniciar uma nova transmissão.
                        </div>
                    `;
                    pausedIndicator.style.display = 'none';
                    lastSuccessfulImage = null;
                    lastSuccessfulTimestamp = null;
                    consecutiveErrors = 0;
                    updateDelay = 500; // Reset delay
                } else if (consecutiveErrors > 5 && lastSuccessfulImage) {
                    pausedIndicator.style.display = 'block';
                    setTimeout(() => {
                        if (consecutiveErrors > 5) {
                            pausedIndicator.style.display = 'none';
                        }
                    }, 3000);
                }
                
                isUpdating = false;
            }
            
            testImg.src = imageUrl;
        }

        function startUpdatingScreen() {
            if (!updateInterval) {
                updateInterval = setInterval(updateScreen, updateDelay);
                console.log(`[Frontend] Atualizações iniciadas com delay de ${updateDelay}ms`);
            }
        }
        
        function restartUpdating() {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
            startUpdatingScreen();
            console.log(`[Frontend] Delay ajustado para ${updateDelay}ms`);
        }

        function startCleanupTask() {
            if (!cleanupInterval) {
                cleanupInterval = setInterval(() => {
                    triggerCacheCleanup();
                }, 60000); // 60 segundos (reduzido de 30s para diminuir carga)
            }
        }

        function stopCleanupTask() {
            if (cleanupInterval) {
                clearInterval(cleanupInterval);
                cleanupInterval = null;
            }
        }

        let lastCleanupTime = 0;
        function triggerCacheCleanup() {
            const now = Date.now();
            if (now - lastCleanupTime < 30000) { // Throttle: mínimo 30 segundos entre limpezas
                return;
            }
            lastCleanupTime = now;
            
            fetch("/trigger_cache_cleanup", {
                method: "POST",
            })
            .then(response => {
                if (response.ok) {
                    console.log("[Frontend] Limpeza de cache acionada com sucesso.");
                } else {
                    console.error("[Frontend] Falha ao acionar a limpeza de cache.");
                }
            })
            .catch(error => {
                console.error("[Frontend] Erro ao acionar a limpeza de cache:", error);
            });
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                console.log("[Frontend] Página ficou visível - retomando atualizações");
                // Reset de erros ao voltar para página
                consecutiveErrors = 0;
                updateDelay = 500;
                if (!updateInterval) {
                    startUpdatingScreen();
                }
            } else {
                console.log("[Frontend] Página ficou oculta - pausando atualizações");
                // Para atualizações quando aba está oculta (economia de recursos)
                if (updateInterval) {
                    clearInterval(updateInterval);
                    updateInterval = null;
                }
                stopCleanupTask();
            }
        });

        document.addEventListener("DOMContentLoaded", checkForTransmission);

        window.addEventListener("beforeunload", () => {
            stopCleanupTask();
        });
    </script>
</body>
</html>
