# MediaMTX Configuration for ScreenShare HLS
# Configuração simplificada e compatível

# General settings
logLevel: info
logDestinations: [stdout]

# API settings
api: yes
apiAddress: :9997

# Metrics
metrics: no

# WHIP server settings (WebRTC ingest)
whip: yes
whipAddress: :8889
whipAllowOrigin: "*"

# HLS server settings (Low Latency HLS output)
hls: yes
hlsAddress: :8888
hlsAllowOrigin: "*"
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# WebRTC settings
webrtc: yes
webrtcAddress: :8890
webrtcAllowOrigin: "*"
webrtcICEServers:
  - urls: ["stun:stun.l.google.com:19302"]

# Path settings - Estados permitidos
paths:
  all:
    source: publisher