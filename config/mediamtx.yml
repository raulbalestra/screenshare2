# MediaMTX Configuration for ScreenShare HLS
# Minimal config compatible with v1.5.1

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS (Low Latency)
hls: yes
hlsAddress: :8888
hlsAllowOrigin: "*"
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# WebRTC
webrtc: yes
webrtcAddress: :8890
webrtcAllowOrigin: "*"
webrtcICEServers: ["stun:stun.l.google.com:19302"]
webrtcICEHostNAT1To1IPs: ["31.97.156.167"]
webrtcICEUDPMuxAddress: :8189
webrtcICETCPMuxAddress: :8189

# RTSP (for compatibility)
rtspAddress: :8554

# Paths
paths:
  all:
    source: publisher