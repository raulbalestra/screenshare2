<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização da Tela</title>
    <!-- Importando uma fonte moderna do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Importando Font Awesome para ícones (sem o atributo de integridade) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f4f6f9;
            --text-color: #333333;
            --background-color: #ffffff;
            --button-bg-color: #dc3545;
            --button-hover-bg-color: #c82333;
            --transition-speed: 0.3s;
            --border-radius: 15px;
            --font-family: 'Roboto', sans-serif;
        }

        /* Reset básico */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--secondary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
        }

        h2 {
            color: var(--primary-color);
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Estilos para a imagem da tela */
        #screen {
            width: 95vw;
            height: 95vh;
            object-fit: contain; /* Cobre toda a área da tela sem distorção */
        }


        /* Responsividade */
        @media (max-width: 768px) {
            #screen {
                height: 100vh;
                object-fit: contain; /* Ajusta a imagem dentro da tela sem cortar */
            }
        }

        /* Estilos para a mensagem de espera */
        #message {
            margin-top: 20px;
            font-size: 1.5em;
            color: #555;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        
        #message i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: block;
        }
        
        #message .waiting-text {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        #message .instruction-text {
            font-size: 0.9em;
            color: #777;
            line-height: 1.6;
        }
        
        /* Indicador de transmissão pausada */
        #pausedIndicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.2em;
            z-index: 1000;
            display: none;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        #pausedIndicator i {
            display: block;
            font-size: 2em;
            margin-bottom: 10px;
            color: #ffc107;
        }

    </style>
</head>
<body>
    <h2>Painel de Filas - {{ localidade|capitalize }}</h2>
    <img id="screen" src="" alt="Transmissão da Tela" style="display: none;">
    <div id="message">
        <i class="fas fa-video-slash"></i>
        <div class="waiting-text">Aguardando o início da transmissão...</div>
        <div class="instruction-text">
            A transmissão ainda não foi iniciada.<br>
            Aguarde o operador iniciar o compartilhamento de tela.
        </div>
    </div>
    <div id="pausedIndicator">
        <i class="fas fa-pause-circle"></i>
        <div>Transmissão Pausada</div>
        <small style="font-size: 0.8em; opacity: 0.8;">Mostrando última imagem capturada</small>
    </div>

    <script>
        const baseImageUrl = "/serve_pil_image/";
        const localidade = "{{ localidade|default('') }}";  
        const screenImage = document.getElementById('screen');
        const messageDiv = document.getElementById('message');
        const pausedIndicator = document.getElementById('pausedIndicator');

        let updateInterval;
        let cleanupInterval;
        let consecutiveErrors = 0;
        let lastSuccessfulImage = null;

        function checkForTransmission() {
            if (!localidade) {
                messageDiv.textContent = "Localidade não especificada.";
                return;
            }

            const imageUrl = baseImageUrl + localidade + "/screen.png?random=" + new Date().getTime();
            const img = new Image();
            img.onload = function() {
                screenImage.src = imageUrl;
                screenImage.style.display = 'block';
                messageDiv.style.display = 'none';
                lastSuccessfulImage = imageUrl;
                consecutiveErrors = 0;
                startUpdatingScreen();
                startCleanupTask();
            };
            img.onerror = function() {
                // Se nunca carregou nenhuma imagem, mostra mensagem
                if (!lastSuccessfulImage) {
                    screenImage.style.display = 'none';
                    messageDiv.style.display = 'block';
                    messageDiv.innerHTML = `
                        <i class="fas fa-video-slash"></i>
                        <div class="waiting-text">Nenhuma transmissão ativa</div>
                        <div class="instruction-text">
                            A transmissão ainda não foi iniciada para <strong>${localidade}</strong>.<br>
                            Aguarde o operador iniciar o compartilhamento de tela.
                        </div>
                    `;
                } else {
                    // Se já tinha imagem, mantém a última imagem válida
                    console.log("[Frontend] Mantendo última imagem válida");
                }
            };
            img.src = imageUrl;
        }

        function updateScreen() {
            if (!localidade) return;

            const imageUrl = baseImageUrl + localidade + "/screen.png?random=" + new Date().getTime();
            
            // Criar uma nova imagem para verificar se carrega corretamente
            const testImg = new Image();
            testImg.onload = function() {
                screenImage.src = imageUrl;
                lastSuccessfulImage = imageUrl;
                consecutiveErrors = 0;
                
                // Se estava mostrando mensagem, esconde
                if (messageDiv.style.display !== 'none') {
                    messageDiv.style.display = 'none';
                    screenImage.style.display = 'block';
                }
                
                // Esconde indicador de pausado se estava visível
                pausedIndicator.style.display = 'none';
            };
            testImg.onerror = function() {
                consecutiveErrors++;
                console.warn(`[Frontend] Erro ao carregar frame (${consecutiveErrors} consecutivos)`);
                
                // Mantém a última imagem válida visível
                if (lastSuccessfulImage) {
                    // Não faz nada, mantém a imagem atual
                    console.log("[Frontend] Mantendo última imagem válida após erro");
                }
                
                // Se muitos erros consecutivos, mostra indicador de pausado
                if (consecutiveErrors > 5 && lastSuccessfulImage) {
                    pausedIndicator.style.display = 'block';
                    
                    // Auto-esconde após 3 segundos
                    setTimeout(() => {
                        if (consecutiveErrors > 5) {
                            pausedIndicator.style.display = 'none';
                        }
                    }, 3000);
                }
            };
            testImg.src = imageUrl;
        }

        function startUpdatingScreen() {
            if (!updateInterval) {
                updateInterval = setInterval(updateScreen, 1000);
            }
        }

        function startCleanupTask() {
            if (!cleanupInterval) {
                cleanupInterval = setInterval(() => {
                    triggerCacheCleanup();
                }, 30000); // 30 segundos
            }
        }

        function stopCleanupTask() {
            if (cleanupInterval) {
                clearInterval(cleanupInterval);
                cleanupInterval = null;
            }
        }

        let lastCleanupTime = 0;
        function triggerCacheCleanup() {
            const now = Date.now();
            if (now - lastCleanupTime < 5000) { // Throttle: mínimo 5 segundos entre limpezas
                return;
            }
            lastCleanupTime = now;
            
            fetch("/trigger_cache_cleanup", {
                method: "POST",
            })
            .then(response => {
                if (response.ok) {
                    console.log("[Frontend] Limpeza de cache acionada com sucesso.");
                } else {
                    console.error("[Frontend] Falha ao acionar a limpeza de cache.");
                }
            })
            .catch(error => {
                console.error("[Frontend] Erro ao acionar a limpeza de cache:", error);
            });
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                // Apenas retoma atualizações de tela, sem cleanup desnecessário
                console.log("[Frontend] Página ficou visível - retomando atualizações");
            } else {
                stopCleanupTask();
                console.log("[Frontend] Página ficou oculta - pausando limpeza");
            }
        });

        document.addEventListener("DOMContentLoaded", checkForTransmission);

        window.addEventListener("beforeunload", () => {
            stopCleanupTask();
        });
    </script>
</body>
</html>
